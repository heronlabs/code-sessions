name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: googleapis/release-please-action@0b6b3fc0186a2f7118bfd88fab9ea481e1839504
        with:
          release-type: simple
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
